<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS 戰情室</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #58a6ff;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: #8b949e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #2ea44f;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px #2ea44f;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 164, 79, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(46, 164, 79, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 164, 79, 0); }
        }
        /* TradingView Widget Container */
        .tradingview-widget-container {
            height: 300px;
            width: 100%;
        }
        .mini-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        @media (max-width: 600px) {
            .mini-charts {
                grid-template-columns: 1fr;
            }
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <h1>🚀 BOSS 戰情室 <span class="status-dot"></span></h1>

    <div class="container">
        <!-- 台股大盤 -->
        <div class="card">
            <div class="card-header">
                <span>📉 台股加權指數 (TWSE)</span>
                <span style="font-size: 0.8em; color: #58a6ff;">LIVE</span>
            </div>
            <div class="tradingview-widget-container">
                <div id="tradingview_twse"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget(
                {
                    "autosize": true,
                    "symbol": "TWSE:TAIEX",
                    "interval": "D",
                    "timezone": "Asia/Taipei",
                    "theme": "dark",
                    "style": "1",
                    "locale": "zh_TW",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_twse"
                });
                </script>
            </div>
        </div>

        <!-- 迷你圖表區 -->
        <div class="mini-charts">
            <!-- 台積電 -->
            <div class="card">
                <div class="card-header">⚡ 台積電 (2330)</div>
                <div class="tradingview-widget-container" style="height: 200px;">
                    <div id="tradingview_tsmc"></div>
                    <script type="text/javascript">
                    new TradingView.widget(
                    {
                        "autosize": true,
                        "symbol": "TWSE:2330",
                        "interval": "D",
                        "timezone": "Asia/Taipei",
                        "theme": "dark",
                        "style": "2",
                        "locale": "zh_TW",
                        "enable_publishing": false,
                        "hide_top_toolbar": true,
                        "hide_legend": true,
                        "container_id": "tradingview_tsmc"
                    });
                    </script>
                </div>
            </div>

            <!-- 比特幣 -->
            <div class="card">
                <div class="card-header">💰 比特幣 (BTC/USD)</div>
                <div class="tradingview-widget-container" style="height: 200px;">
                    <div id="tradingview_btc"></div>
                    <script type="text/javascript">
                    new TradingView.widget(
                    {
                        "autosize": true,
                        "symbol": "BINANCE:BTCUSDT",
                        "interval": "60",
                        "timezone": "Asia/Taipei",
                        "theme": "dark",
                        "style": "2",
                        "locale": "zh_TW",
                        "enable_publishing": false,
                        "hide_top_toolbar": true,
                        "hide_legend": true,
                        "container_id": "tradingview_btc"
                    });
                    </script>
                </div>
            </div>
        </div>

        <!-- 匯率 -->
        <div class="card">
            <div class="card-header">💵 美元兌台幣 (USD/TWD)</div>
            <div class="tradingview-widget-container" style="height: 200px;">
                <div id="tradingview_usdtwd"></div>
                <script type="text/javascript">
                new TradingView.widget(
                {
                    "autosize": true,
                    "symbol": "FX_IDC:USDTWD",
                    "interval": "D",
                    "timezone": "Asia/Taipei",
                    "theme": "dark",
                    "style": "3",
                    "locale": "zh_TW",
                    "enable_publishing": false,
                    "hide_top_toolbar": true,
                    "container_id": "tradingview_usdtwd"
                });
                </script>
            </div>
        </div>

    </div>

    <div class="footer">
        System Online: OpenClaw v2026.3.5 <br>
        Assisted by Kim Go-eun
    </div>

</body>
</html>
